<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mg Psicovida</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <div class="header-container">
      <a href="#inicio" class="logo">
        <img src="icons/logo.png" alt="MG Psicovida">
      </a>

      <nav class="nav">
        <ul class="menu">
          <li><a href="#inicio">Inicio</a></li>
          <li><a href="#sobre-mi">Sobre mí</a></li>
          <li><a href="#terapias">Terapias</a></li>
          <li><a href="#enfoque">Mi enfoque</a></li>
        </ul>
      </nav>

      <a href="#contacto" class="btn-contacto">Contacto</a>
    </div>
  </header>

  <main>
    <section id="inicio" class="pantalla hero hero-transparente">
      <div class="hero-superior-derecha">
        <h1>MG PSICOVIDA</h1>
      </div>

      <div class="hero-inferior-izquierda">
        <p class="nombre">María Gamero Rodríguez</p>
        <p>Psicóloga Sanitaria Col M-21560</p>
        <p>Especializada en Psicología</p>
        <p>Perinatal, Pareja y Med.</p>
        <p>Psicosomática</p>
      </div>
    </section>

    <section id="sobre-mi" class="pantalla seccion">
      <div class="contenido-seccion">
        <h2>Sobre mí</h2>
      </div>
    </section>

    <section id="terapias" class="pantalla seccion">
      <div class="contenido-seccion">
        <h2>Terapias</h2>
      </div>
    </section>

    <section id="enfoque" class="pantalla seccion">
      <div class="contenido-seccion">
        <h2>Mi enfoque</h2>
      </div>
    </section>

    <section id="contacto" class="pantalla seccion">
      <div class="contenido-seccion">
        <h2>Contacto</h2>
        <p class="copyright">© 2026 Mg Psicovida</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
